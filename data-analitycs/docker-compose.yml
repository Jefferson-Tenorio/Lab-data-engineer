services:
  # O Banco de Dados (SUT - System Under Test)
  db:
    image: postgres:15
    container_name: badass_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: lab_dados
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # O Laboratório (JupyterLab)
  lab:
    image: jupyter/scipy-notebook:latest
    container_name: badass_jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: dados # Senha simples para entrar
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./notebooks:/home/jovyan/work # Salva seus notebooks na pasta local
    depends_on:
      - db

volumes:
  postgres_data: