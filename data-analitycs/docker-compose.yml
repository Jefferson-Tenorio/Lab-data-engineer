version: '3.8'

# 🌐 Rede isolada para o projeto: Garante que seus containers conversem entre si
# mas não vazem para a rede padrão do host desnecessariamente.
networks:
  lakehouse-net:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # 1. Metadata & Source Database (PostgreSQL)
  # ---------------------------------------------------------------------------
  metadata-db:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password  # Em prod, use Docker Secrets ou .env
      POSTGRES_DB: real_estate_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse-net

  # ---------------------------------------------------------------------------
  # 2. Object Storage (MinIO) - O "S3" Local
  # ---------------------------------------------------------------------------
  object-storage:
    image: minio/minio:latest
    container_name: lakehouse-minio
    hostname: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"  # API Port (S3 Protocol)
      - "9001:9001"  # Console UI
    volumes:
      - minio_data:/data
    networks:
      - lakehouse-net
    # Healthcheck: Garante que o serviço está saudável antes de outros dependerem dele
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # 3. Storage Setup (MinIO Client) - Inicialização de Buckets
  # ---------------------------------------------------------------------------
  storage-setup:
    image: minio/mc:latest
    container_name: lakehouse-setup
    depends_on:
      object-storage:
        condition: service_healthy # Só roda quando o MinIO estiver 100% pronto
    networks:
      - lakehouse-net
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      /usr/bin/mc alias set lakehouse http://minio:9000 minio_admin minio_password;
      echo 'Creating Medallion Architecture Buckets...';
      /usr/bin/mc mb --ignore-existing lakehouse/bronze;
      /usr/bin/mc mb --ignore-existing lakehouse/silver;
      /usr/bin/mc mb --ignore-existing lakehouse/gold;
      /usr/bin/mc mb --ignore-existing lakehouse/landing;
      echo 'Buckets created successfully.';
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # 4. Processing Engine (Jupyter + Spark)
  # ---------------------------------------------------------------------------
  spark-workspace:
    image: jupyter/pyspark-notebook:latest
    container_name: lakehouse-spark
    restart: unless-stopped
    ports:
      - "8888:8888"  # Jupyter Lab
      - "4040:4040"  # Spark UI (Jobs Monitoring)
    environment:
      JUPYTER_TOKEN: data_engineer  # Token de acesso
      JUPYTER_ENABLE_LAB: "yes"
      # Configurações para o Spark achar o MinIO (S3)
      # Nota: Essas configs geralmente vão no código Python, mas aqui ajudam
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data # Mapeamento local para simular ingestão
    networks:
      - lakehouse-net
    depends_on:
      - object-storage
      - metadata-db

# Volumes persistentes gerenciados pelo Docker
volumes:
  postgres_data:
    name: lakehouse-pg-volume
  minio_data:
    name: lakehouse-s3-volume