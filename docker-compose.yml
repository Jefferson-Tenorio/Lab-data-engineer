  networks:
    lakehouse-net:
      driver: bridge

  services:

    # ---------------------------------------------------------------------------
    # 1. Metadata & Source Database (PostgreSQL)
    # ---------------------------------------------------------------------------
    metadata-db:
      image: postgres:15-alpine
      container_name: lakehouse-postgres
      restart: always
      environment:
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: admin_password
        POSTGRES_DB: real_estate_dw
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
      networks:
        - lakehouse-net
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U admin -d real_estate_dw"]
        interval: 10s
        timeout: 5s
        retries: 5

    # ---------------------------------------------------------------------------
    # 2. Object Storage (MinIO)
    # ---------------------------------------------------------------------------
    object-storage:
      image: minio/minio:RELEASE.2024-02-09T21-25-16Z
      container_name: lakehouse-minio
      hostname: minio
      restart: always
      command: server /data --console-address ":9001"
      environment:
        MINIO_ROOT_USER: minio_admin
        MINIO_ROOT_PASSWORD: minio_password
      ports:
        - "9000:9000"
        - "9001:9001"
      volumes:
        - minio_data:/data
      networks:
        - lakehouse-net

    # ---------------------------------------------------------------------------
    # 3. Storage Setup (Criação dos Buckets)
    # ---------------------------------------------------------------------------
    storage-setup:
      image: minio/mc:latest
      container_name: lakehouse-setup
      networks:
        - lakehouse-net
      entrypoint: >
        echo 'Creating Medallion Architecture Buckets...';
        /usr/bin/mc mb --ignore-existing lakehouse/bronze;
        /usr/bin/mc mb --ignore-existing lakehouse/silver;
        /usr/bin/mc mb --ignore-existing lakehouse/gold;
        /usr/bin/mc mb --ignore-existing lakehouse/landing;
        echo 'Buckets created successfully.';
        exit 0;
        "

    # ---------------------------------------------------------------------------
    # 4. Processing Engine (Jupyter + Spark)
    # ---------------------------------------------------------------------------
    spark-workspace:
      build: .
      container_name: lakehouse-spark
      user: root
      restart: unless-stopped
      ports:
        - "8888:8888"
        - "4040:4040"
      environment:
        JUPYTER_TOKEN: data_engineer
        JUPYTER_ENABLE_LAB: "yes"
        # Matriz de compatibilidade corrigida para Spark 3.5
      volumes:
        - ./notebooks:/home/jovyan/work
        - ./data:/home/jovyan/data
      networks:
        - lakehouse-net
      depends_on:
        metadata-db:
          condition: service_started

  volumes:
    postgres_data:
      name: lakehouse-pg-volume
    minio_data:
      name: lakehouse-s3-volume